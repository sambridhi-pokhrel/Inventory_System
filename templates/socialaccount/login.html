<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In via Google | Inventory System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 420px;
      width: 100%;
      padding: 2.5rem;
    }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg,#6d28d9,#7c3aed);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: #fff;
      margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.4rem; font-weight: 800; color: #0f172a; letter-spacing: -.03em; }
    p  { color: #64748b; font-size: .9rem; }
    .btn-continue {
      background: #6d28d9; color: #fff; border: none;
      border-radius: 9px; padding: .8rem 1.5rem;
      font-weight: 700; font-size: .95rem;
      width: 100%; transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-continue:hover { background: #5b21b6; transform: translateY(-1px); }
    .btn-cancel {
      background: transparent; color: #64748b;
      border: 1.5px solid #e2e8f0; border-radius: 9px;
      padding: .75rem 1.5rem; font-weight: 600; font-size: .9rem;
      width: 100%; transition: all .18s; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-cancel:hover { border-color: #6d28d9; color: #6d28d9; }
    .google-badge {
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: .75rem 1rem;
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .google-badge img { width: 24px; height: 24px; }
    .google-badge div { font-size: .85rem; color: #475569; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card text-center">
    <div class="logo"><i class="bi bi-box-seam"></i></div>
    <h1 class="mb-2">Sign in via Google</h1>
    <p class="mb-4">You are about to sign in to <strong>Inventory System</strong> using your Google account.</p>

    <div class="google-badge text-start">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
      <div>Your Google account will be linked to Inventory System</div>
    </div>

    <form method="post" action="." class="d-flex flex-column gap-2">
      {% csrf_token %}
      <button type="submit" class="btn-continue">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="">
        Continue with Google
      </button>
    </form>
    <div class="mt-2">
      <a href="{% url 'users:login' %}" class="btn-cancel">
        <i class="bi bi-arrow-left"></i> Cancel
      </a>
    </div>
    <p class="mt-3 mb-0" style="font-size:.78rem;color:#94a3b8;">
      New users require admin approval before accessing the system.
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
