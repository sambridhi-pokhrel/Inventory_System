{% extends 'base.html' %}
{% load inventory_extras %}

{% block title %}Edit Item | Inventory System{% endblock %}

{% block header %}
<div class="dashboard-header">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h1 class="display-5 fw-bold mb-2"><i class="bi bi-pencil-square me-3"></i>Edit Item</h1>
        <p class="lead mb-0">Update inventory item details</p>
      </div>
      <div class="col-md-4 text-md-end">
        <a href="{% url 'inventory:item_list' %}" class="btn btn-outline-light">
          <i class="bi bi-arrow-left me-1"></i>Back to Inventory
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-header" style="background:linear-gradient(135deg,#714b67,#9c7a8a);color:#fff;border-radius:8px 8px 0 0;">
          <h5 class="mb-0"><i class="bi bi-box me-2"></i>Edit Inventory Item</h5>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-tag me-1"></i> Item Name</label>
              <input name="name" class="form-control" value="{{ item.name }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-boxes me-1"></i> Quantity</label>
              <input name="quantity" type="number" class="form-control" value="{{ item.quantity }}" min="0" required>
            </div>
            <div class="mb-4">
              <label class="form-label"><i class="bi bi-currency-rupee me-1"></i> Price (Rs.)</label>
              <input name="price" type="number" step="0.01" class="form-control" value="{{ item.price }}" min="0" required>
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-primary btn-lg"><i class="bi bi-check-circle me-1"></i> Update Item</button>
              <a href="{% url 'inventory:item_list' %}" class="btn btn-outline-secondary" style="color:#0f172a !important;border-color:#94a3b8 !important;background:#fff !important;font-weight:600 !important;"><i class="bi bi-arrow-left me-1"></i> Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
